<!DOCTYPE html>
<html>
<head>
    <title>Unified Intelligence Extractor v11</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-10 font-sans">
    <div class="max-w-4xl mx-auto bg-white p-8 rounded-2xl shadow-xl border border-slate-200">
        <h1 class="text-2xl font-bold text-slate-900 mb-2">Unified Data Normalizer</h1>
        <p class="text-slate-500 mb-6">Paste raw competitor payloads to generate standardized JSON for the dashboard.</p>
        
        <textarea id="input" class="w-full h-64 p-4 border-2 border-slate-100 rounded-xl font-mono text-xs focus:border-indigo-500 focus:outline-none mb-6" placeholder="Paste Postman/HTML response here..."></textarea>
        
        <div class="grid grid-cols-3 gap-4">
            <button onclick="process('Stripe')" class="bg-[#635bff] text-white py-4 rounded-lg font-bold hover:opacity-90 transition-all">Normalize Stripe</button>
            <button onclick="process('Adyen')" class="bg-[#00d16a] text-white py-4 rounded-lg font-bold hover:opacity-90 transition-all">Normalize Adyen</button>
            <button onclick="process('WorldPay')" class="bg-red-600 text-white py-4 rounded-lg font-bold hover:opacity-90 transition-all">Normalize WorldPay</button>
        </div>
        <div id="status" class="mt-4 p-4 rounded-lg hidden text-sm font-medium"></div>
    </div>

    <script>
        const MASTER_CONFIG = {
            "Australia": "APAC", "Singapore": "APAC", "Japan": "APAC",
            "Brazil": "LATAM", "Mexico": "LATAM",
            "Canada": "North America", "United States": "North America",
            "United Kingdom": "Europe", "Netherlands": "Europe", "Germany": "Europe"
        };

        function process(comp) {
            const raw = document.getElementById('input').value;
            const results = {};
            const date = new Date().toISOString().split('T')[0];

            Object.keys(MASTER_CONFIG).forEach(country => {
                let tags = ["card"];
                let status = "supported";
                let notes = "Verified via Payload";

                // Competitor-Specific Heuristics
                if (comp === 'Stripe') {
                    if (raw.includes("Link")) tags.push("Link");
                    if (raw.includes("Apple Pay")) tags.push("Apple Pay");
                } else if (comp === 'Adyen') {
                    if (raw.includes("bank")) tags.push("bank");
                    if (country === "Brazil" && raw.includes("Pix")) tags.push("Pix");
                } else if (comp === 'WorldPay') {
                    if (raw.includes("APM")) tags.push("APM");
                }

                // Normalization into Master Schema
                results[country] = {
                    "region": MASTER_CONFIG[country],
                    "domestic": { "status": status, "tags": tags, "notes": notes },
                    "cross_border": { "status": "supported", "tags": ["card"], "notes": "International" }
                };
            });

            downloadJSON({ "Metadata": { "Competitor": comp, "LastUpdated": date }, "Countries": results }, comp);
        }

        function downloadJSON(obj, comp) {
            const blob = new Blob([JSON.stringify(obj, null, 2)], {type: "application/json"});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${comp.toLowerCase()}.json`;
            a.click();
            showStatus(`Successfully generated ${comp.toLowerCase()}.json`);
        }

        function showStatus(msg) {
            const s = document.getElementById('status');
            s.innerText = msg;
            s.className = "mt-4 p-4 rounded-lg block bg-emerald-50 text-emerald-700";
        }
    </script>
</body>
</html>
