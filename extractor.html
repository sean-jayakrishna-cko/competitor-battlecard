<!DOCTYPE html>
<html>
<head>
    <title>Card Rail Intelligence Extractor v12</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-10 font-sans">
    <div class="max-w-4xl mx-auto bg-white p-8 rounded-2xl shadow-xl border border-slate-200">
        <h1 class="text-2xl font-bold text-slate-900 mb-2">Card Rail Extractor</h1>
        <p class="text-slate-500 mb-6">Extracting local card schemes and global network integrations.</p>
        
        <textarea id="input" class="w-full h-64 p-4 border-2 border-slate-100 rounded-xl font-mono text-xs focus:border-indigo-500 mb-6" placeholder="Paste Postman/HTML payload here..."></textarea>
        
        <div class="grid grid-cols-3 gap-4">
            <button onclick="process('Stripe')" class="bg-[#635bff] text-white py-4 rounded-lg font-bold hover:opacity-90">Analyze Stripe Rails</button>
            <button onclick="process('Adyen')" class="bg-[#00d16a] text-white py-4 rounded-lg font-bold hover:opacity-90">Analyze Adyen Rails</button>
            <button onclick="process('WorldPay')" class="bg-red-600 text-white py-4 rounded-lg font-bold hover:opacity-90">Analyze WorldPay Rails</button>
        </div>
        <div id="status" class="mt-4 p-4 rounded-lg hidden text-sm font-medium text-emerald-700 bg-emerald-50"></div>
    </div>

    <script>
        const MASTER_CONFIG = {
            "Australia": "APAC", "Singapore": "APAC", "Japan": "APAC",
            "Brazil": "LATAM", "Mexico": "LATAM",
            "Canada": "North America", "United States": "North America",
            "United Kingdom": "Europe", "Netherlands": "Europe", "Germany": "Europe"
        };

        // Master Card Rail Definitions
        const CARD_RAILS = {
            "Global": ["Visa", "Mastercard", "AMEX", "Discover", "Diners Club", "JCB", "UnionPay"],
            "Local": ["eftpos Australia", "Interac", "Cartes Bancaires", "Bancontact", "Elo", "Hipercard", "Dankort", "girocard", "V Pay", "PostFinance"]
        };

        function process(comp) {
            const raw = document.getElementById('input').value;
            const results = {};
            const date = new Date().toISOString().split('T')[0];

            Object.keys(MASTER_CONFIG).forEach(country => {
                let tags = [];
                
                // Identify integrated rails by scanning payload strings
                [...CARD_RAILS.Global, ...CARD_RAILS.Local].forEach(rail => {
                    if (raw.toLowerCase().includes(rail.toLowerCase())) {
                        tags.push(rail);
                    }
                });

                // Status Logic: Partial if missing a core local scheme for that market
                let status = "supported";
                if (country === "Australia" && !tags.includes("eftpos Australia")) status = "partial";
                if (country === "Canada" && !tags.includes("Interac")) status = "partial";
                if (country === "Brazil" && !tags.includes("Elo")) status = "partial";

                results[country] = {
                    "region": MASTER_CONFIG[country],
                    "domestic": { 
                        "status": status, 
                        "tags": tags.length ? tags : ["Standard Cards"], 
                        "notes": status === "partial" ? "Missing primary local rail" : "Full rail integration" 
                    },
                    "cross_border": { 
                        "status": "supported", 
                        "tags": ["Visa", "Mastercard"], 
                        "notes": "Global acquiring" 
                    }
                };
            });

            const finalObj = { "Metadata": { "Competitor": comp, "LastUpdated": date }, "Countries": results };
            const blob = new Blob([JSON.stringify(finalObj, null, 2)], {type: "application/json"});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${comp.toLowerCase()}.json`;
            a.click();
            
            const s = document.getElementById('status');
            s.innerText = `Successfully mapped card rails for ${comp}`;
            s.classList.remove('hidden');
        }
    </script>
</body>
</html>
