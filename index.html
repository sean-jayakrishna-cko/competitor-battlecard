<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Card Rail Intelligence Battlecard v3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* v3 Pill Styling: Increased padding, full roundness, and wider margins */
        .rail-pill { 
            @apply inline-flex items-center px-4 py-1 rounded-full text-[10px] font-bold uppercase mr-2 mb-1 tracking-wider border transition-all;
            background-color: #E6F4EA; 
            color: #137333;
            border-color: #CEEAD6;
        }
        .status-supported { @apply text-emerald-600 font-black text-2xl; }
        .status-partial { @apply text-amber-500 font-black text-2xl; }
        .status-not_available { @apply text-rose-500 font-black text-2xl; }
        
        /* Row highlighting for better scannability */
        .country-row:hover { background-color: #f8fafc; }
    </style>
</head>
<body class="bg-[#F1F5F9] p-8 text-slate-800">
    <div class="max-w-7xl mx-auto">
        <header class="flex justify-between items-end mb-10 border-b border-slate-300 pb-8">
            <div>
                <h1 class="text-4xl font-black tracking-tight text-slate-900 uppercase">Card Rail Battlecard</h1>
                <p class="text-slate-500 font-semibold mt-2">Network Integration & Local Scheme Intelligence</p>
            </div>
            <div class="flex space-x-2 p-1.5 bg-slate-200 rounded-2xl shadow-inner">
                <button onclick="filterRegion('All')" class="px-5 py-2 text-xs font-bold rounded-xl transition-all hover:bg-white/60 focus:bg-white focus:shadow-sm uppercase">All</button>
                <button onclick="filterRegion('APAC')" class="px-5 py-2 text-xs font-bold rounded-xl transition-all hover:bg-white/60 focus:bg-white uppercase">APAC</button>
                <button onclick="filterRegion('LATAM')" class="px-5 py-2 text-xs font-bold rounded-xl transition-all hover:bg-white/60 focus:bg-white uppercase">LATAM</button>
                <button onclick="filterRegion('North America')" class="px-5 py-2 text-xs font-bold rounded-xl transition-all hover:bg-white/60 focus:bg-white uppercase">NA</button>
                <button onclick="filterRegion('Europe')" class="px-5 py-2 text-xs font-bold rounded-xl transition-all hover:bg-white/60 focus:bg-white uppercase">EU</button>
            </div>
        </header>

        <div class="bg-white shadow-2xl rounded-3xl overflow-hidden border border-slate-200">
            <table class="min-w-full divide-y divide-slate-200">
                <thead class="bg-slate-50">
                    <tr>
                        <th class="px-8 py-5 text-left text-[11px] font-black text-slate-400 uppercase tracking-[0.2em] w-64">Market</th>
                        <th class="px-4 py-5 text-left text-[11px] font-black text-slate-400 uppercase tracking-[0.2em] w-32">Acquiring</th>
                        <th class="px-8 py-5 text-center text-[11px] font-black text-slate-400 uppercase tracking-[0.2em] border-l border-slate-100">Stripe</th>
                        <th class="px-8 py-5 text-center text-[11px] font-black text-slate-400 uppercase tracking-[0.2em] border-l border-slate-100">Adyen</th>
                        <th class="px-8 py-5 text-center text-[11px] font-black text-slate-400 uppercase tracking-[0.2em] border-l border-slate-100">WorldPay</th>
                    </tr>
                </thead>
                <tbody id="main-table" class="bg-white divide-y divide-slate-100 text-sm font-medium">
                    </tbody>
            </table>
        </div>

        <footer class="mt-12 mb-8 flex justify-center space-x-6">
            <a href="extractor.html" class="text-[10px] text-slate-400 hover:text-indigo-600 transition-colors uppercase tracking-widest font-black border-b border-transparent hover:border-indigo-600">Admin: Update Rails →</a>
        </footer>
    </div>

    <script>
        let fullData = {};
        const comps = ['stripe', 'adyen', 'worldpay'];

        async function init() {
            for (let c of comps) {
                try {
                    // Cache buster for live GitHub deployment
                    const response = await fetch(`./data/${c}.json?t=${Date.now()}`);
                    fullData[c] = await response.json();
                } catch (e) { console.warn(`${c}.json not found.`); }
            }
            renderTable('All');
        }

        function renderTable(regionFilter) {
            const tbody = document.getElementById('main-table');
            tbody.innerHTML = '';
            
            const allCountries = [...new Set(Object.values(fullData).flatMap(d => Object.keys(d.Countries)))].sort();

            allCountries.forEach(country => {
                const countryRegion = fullData['stripe']?.Countries[country]?.region || fullData['adyen']?.Countries[country]?.region;
                if (regionFilter !== 'All' && countryRegion !== regionFilter) return;

                ['domestic', 'cross_border'].forEach((flow, i) => {
                    const tr = document.createElement('tr');
                    tr.className = "country-row transition-all";

                    if (i === 0) {
                        tr.innerHTML = `<td rowspan="2" class="px-8 py-8 font-extrabold text-slate-900 border-r border-slate-50 align-top">
                                            <div class="text-lg tracking-tight">${country}</div>
                                            <div class="text-[9px] text-slate-400 uppercase mt-1 tracking-widest">${countryRegion}</div>
                                        </td>`;
                    }

                    const flowLabel = flow === 'domestic' ? 'Domestic' : 'Cross-border';
                    tr.innerHTML += `<td class="px-4 py-6 text-slate-400 font-bold text-[10px] uppercase border-r border-slate-50">${flowLabel}</td>`;
                    
                    comps.forEach(c => {
                        const cell = fullData[c]?.Countries[country]?.[flow];
                        const td = document.createElement('td');
                        td.className = `px-8 py-6 text-center border-l border-slate-50 align-middle`;
                        
                        if (cell) {
                            const icon = cell.status === 'supported' ? '✓' : (cell.status === 'partial' ? '≈' : '×');
                            const pills = cell.tags.map(t => `<span class="rail-pill">${t}</span>`).join('');
                            
                            td.innerHTML = `
                                <div class="status-${cell.status} mb-3">${icon}</div>
                                <div class="flex flex-wrap justify-center max-w-xs mx-auto">${pills}</div>
                                <div class="text-[9px] text-slate-400 mt-3 italic font-semibold leading-relaxed px-4">${cell.notes}</div>
                            `;
                        } else {
                            td.innerHTML = `<span class="text-slate-200 font-light italic text-[10px] uppercase tracking-widest">No Intel</span>`;
                        }
                        tr.appendChild(td);
                    });
                    tbody.appendChild(tr);
                });
            });
        }

        function filterRegion(region) { renderTable(region); }
        init();
    </script>
</body>
</html>
