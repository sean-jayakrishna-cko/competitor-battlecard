<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Strategic Coverage Battlecard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Signature soft green badge styling from mockup */
        .pm-badge { 
            @apply inline-flex items-center px-2 py-0.5 rounded text-[10px] font-bold uppercase mr-1 mb-1 tracking-wider;
            background-color: #E6F4EA; 
            color: #137333;
            border: 1px solid #CEEAD6;
        }
        .status-supported { color: #137333; }
        .status-not-available { color: #D93025; }
        .status-partial { color: #E37400; }
    </style>
</head>
<body class="bg-[#F8F9FA] p-8 text-slate-800">
    <div class="max-w-7xl mx-auto">
        <header class="flex justify-between items-end mb-8 border-b pb-6 border-slate-200">
            <div>
                <h1 class="text-3xl font-extrabold tracking-tight text-slate-900">Competitor Coverage Battlecard</h1>
                <p class="text-slate-500 font-medium">Real-time regional payment intelligence aggregator</p>
            </div>
            <div class="flex space-x-1 p-1 bg-slate-200 rounded-lg">
                <button onclick="filterRegion('All')" class="px-4 py-1.5 text-sm font-semibold rounded-md transition-all hover:bg-white/50 active:bg-white focus:bg-white shadow-sm">All</button>
                <button onclick="filterRegion('APAC')" class="px-4 py-1.5 text-sm font-semibold rounded-md transition-all hover:bg-white/50 focus:bg-white">APAC</button>
                <button onclick="filterRegion('LATAM')" class="px-4 py-1.5 text-sm font-semibold rounded-md transition-all hover:bg-white/50 focus:bg-white">LATAM</button>
                <button onclick="filterRegion('North America')" class="px-4 py-1.5 text-sm font-semibold rounded-md transition-all hover:bg-white/50 focus:bg-white">NA</button>
                <button onclick="filterRegion('Europe')" class="px-4 py-1.5 text-sm font-semibold rounded-md transition-all hover:bg-white/50 focus:bg-white">EU</button>
            </div>
        </header>

        <div class="bg-white shadow-xl rounded-xl overflow-hidden border border-slate-200">
            <table class="min-w-full divide-y divide-slate-200">
                <thead class="bg-slate-50">
                    <tr>
                        <th class="px-6 py-4 text-left text-[11px] font-bold text-slate-400 uppercase tracking-widest w-48">Country</th>
                        <th class="px-4 py-4 text-left text-[11px] font-bold text-slate-400 uppercase tracking-widest w-24">Flow</th>
                        <th class="px-6 py-4 text-center text-[11px] font-bold text-slate-400 uppercase tracking-widest border-l border-slate-200">Stripe</th>
                        <th class="px-6 py-4 text-center text-[11px] font-bold text-slate-400 uppercase tracking-widest border-l border-slate-200">Adyen</th>
                        <th class="px-6 py-4 text-center text-[11px] font-bold text-slate-400 uppercase tracking-widest border-l border-slate-200">WorldPay</th>
                    </tr>
                </thead>
                <tbody id="main-table" class="bg-white divide-y divide-slate-200">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        let fullData = {};
        const comps = ['stripe', 'adyen', 'worldpay'];

        async function init() {
            for (let c of comps) {
                try {
                    const response = await fetch(`./data/${c}.json`);
                    fullData[c] = await response.json();
                } catch (e) { console.warn(`Note: ${c}.json not found yet.`); }
            }
            renderTable('All');
        }

        function renderTable(regionFilter) {
            const tbody = document.getElementById('main-table');
            tbody.innerHTML = '';
            
            const allCountries = [...new Set(Object.values(fullData).flatMap(d => Object.keys(d.Countries)))].sort();

            allCountries.forEach(country => {
                const countryRegion = fullData['stripe']?.Countries[country]?.region || fullData['adyen']?.Countries[country]?.region;
                if (regionFilter !== 'All' && countryRegion !== regionFilter) return;

                ['domestic', 'cross_border'].forEach((flow, i) => {
                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-slate-50 transition-colors";

                    if (i === 0) {
                        tr.innerHTML = `<td rowspan="2" class="px-6 py-6 font-bold text-slate-900 border-r border-slate-100 align-top">
                                            <div class="text-base">${country}</div>
                                            <div class="text-[10px] text-slate-400 uppercase tracking-tighter mt-1">${countryRegion}</div>
                                        </td>`;
                    }

                    // Capitalized and styled Flow column
                    const displayFlow = flow === 'domestic' ? 'Domestic' : 'Cross-border';
                    tr.innerHTML += `<td class="px-4 py-4 text-slate-400 font-medium text-[11px] border-r border-slate-100">${displayFlow}</td>`;
                    
                    comps.forEach(c => {
                        const cellData = fullData[c]?.Countries[country]?.[flow];
                        const td = document.createElement('td');
                        td.className = `px-6 py-4 text-center border-l border-slate-100 align-middle`;
                        
                        if (cellData) {
                            const statusIcon = cellData.status === 'supported' ? '✓' : '×';
                            const statusColor = `status-${cellData.status}`;
                            
                            // Map tags individually to badges
                            const tagsHtml = cellData.tags.map(t => `<span class="pm-badge">${t}</span>`).join('');
                            
                            td.innerHTML = `
                                <div class="font-black text-xl mb-2 ${statusColor}">${statusIcon}</div>
                                <div class="flex flex-wrap justify-center min-h-[20px]">${tagsHtml}</div>
                                <div class="text-[10px] text-slate-400 mt-2 font-medium italic">${cellData.notes}</div>
                            `;
                        } else {
                            td.innerHTML = `<span class="text-slate-300 font-light italic text-xs text-opacity-50">Pending Intel</span>`;
                        }
                        tr.appendChild(td);
                    });
                    tbody.appendChild(tr);
                });
            });
        }

        function filterRegion(region) { renderTable(region); }
        init();
    </script>
</body>
</html>
